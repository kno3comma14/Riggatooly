name: Package Application
on: 
  push:
    :tags:
      - v*

jobs:
  build:
    strategy:
      matrix:
        # Runs parallel jobs on Windows, Ubuntu (Linux), and macOS
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Install Dependencies
        run: poetry install

      - name: Compile Qt Resources
        # This ensures rc_resources.py is fresh on every OS
        run: poetry run pyside6-rcc resources.qrc -o rc_resources.py

      - name: Build with PyInstaller
        # Adjust 'main.py' to your entry point
        run: poetry run pyinstaller --windowed --onefile main.py

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os }}
          path: dist/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # This tells GitHub which files to include in the release
          files: |
            dist/*.exe
            dist/*.app
            dist/*bin
          generate_release_notes: true # Automatically summarizes your commit messages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub

